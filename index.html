<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Somewhat Amazing Youth Group Race</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background: #121212; color: white; margin: 0; }
        .box { text-align: center; padding: 40px; border: 1px solid #333; border-radius: 12px; background: #1e1e1e; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        input { padding: 12px; border-radius: 6px; border: 1px solid #444; background: #2a2a2a; color: white; width: 200px; outline: none; }
        button { padding: 12px 20px; border-radius: 6px; border: none; background: #007bff; color: white; cursor: pointer; font-weight: bold; margin-left: 5px; }
        button:hover { background: #0056b3; }
        #msg { margin-top: 20px; font-weight: bold; color: #00ff88; min-height: 1.5em; }
   
        .input-container { position: relative; display: inline-block; }
                    input { padding-right: 40px; } /* Space for the eye icon */
                        .toggle-btn { 
                                position: absolute; right: 10px; top: 50%; 
                                        transform: translateY(-50%); background: none; 
                                                border: none; color: #888; cursor: pointer; font-size: 18px;
                                                    }
    /* The Wiggle Instructions */
        @keyframes shake {
        0% {transform: translateX(0);}
        25% {transform: translateX(-10px);}
        50% {transform: translateX(10px);}
        75% {transform: translateX(-10px);}
        100% {transform: translateX(0);}
    }
        .shake-now {
            animation: shake 0.3s ease-in-out;
            border-color: #ff4444 !important;
        }
        
    </style>
</head>
<body>

<div class="box">
    <h2>What's the password?</h2>
    <div class="input-container">
        <input type="password" id="pw" placeholder="Password...">
        <button class="toggle-btn" onclick="toggleView()">👁️</button>
    </div>
    <button onclick="check()">Unlock</button>
    <p id="msg"></p>
</div>

<script>
    function toggleView() {
        const input = document.getElementById("pw");
        const btn = document.querySelector(".toggle-btn");

        if (input.type === "password") {
            input.type = "text";
            btn.innerHTML = "🔒";

        } else {
            input.type = "password";
            btn.innerHTML = "👁️";
        }
    }
    function check() {
        const input = document.getElementById("pw").value.toLowerCase();
        const display = document.getElementById("msg");
        // They should now be autocorrect to lowercase regardly of what case they typed in.
        const box = document.querySelector(".box");

        box.classList.remove("shake-now");

        void box.offsetWidth;
        
        // Change "67" to whatever your heart desires
        if (input === "67") {
            display.style.color = "#ffa500";
            display.innerHTML = "Haha funny. Like the meme?... Try again.";
        
        } else if (input === "password") {
            display.style.color = "#ffa500";
            display.innerHTML = "Wow good one. Haven't heard that before. Try again when you've got a serious answer."

        } else if (input === "code") {
            display.style.colour = "#32cd32";
            display.innerHTML = "Instructions"
            
        }else {
            display.style.color = "#ff4444";
            display.innerHTML = "Unlucky, that's incorrect. Try again with something else.";
            
            box.classList.add("shake-now");
                              setTimeout(() => {
                                  box.classList.remove("shake-now");
                                                       }, 300);
        }
    }
</script>

</body>
</html>
